<!DOCTYPE html>
<html>
<head>
    <title>{{ event.name }}</title>
</head>
<body>
    <h1>{{ event.name }}</h1>
    <p>{{ event.description }}</p>
    <p><strong>Start:</strong> {{ event.start_date|date:"M d, Y H:i" }}</p>
    <p><strong>End:</strong> {{ event.end_date|date:"M d, Y H:i" }}</p>
    <p><strong>Max participants:</strong> {{ event.max_participants }}</p>
    <p>
        <a href="{% url 'event_edit' event.pk %}">Edit</a> |
        <a href="{% url 'event_list' %}">Back to list</a>
    </p>
</body>
</html>
