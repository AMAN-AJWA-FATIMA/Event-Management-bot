{% extends 'events/base.html' %}
{% block title %}Password reset sent{% endblock %}
{% block content %}
<div class="card" style="max-width:400px; margin:40px auto;">
    <h1>Check your email</h1>
    <p style="color:var(--text-secondary);">We've emailed you a link to reset your password. Check your inbox (and spam folder).</p>
    <p class="nav-links" style="margin-top:16px; padding:0;">
        <a href="{% url 'login' %}">Back to login</a>
    </p>
</div>
{% endblock %}
