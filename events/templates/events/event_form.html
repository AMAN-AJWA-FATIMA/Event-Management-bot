{% extends 'events/base.html' %}
{% block title %}{% if object %}Edit Event{% else %}Create Event{% endif %}{% endblock %}
{% block content %}
<div class="card {% if user.is_staff %}admin-accent{% else %}user-accent{% endif %}">
    <h1>{% if object %}Edit Event{% else %}Create Event{% endif %}</h1>
</div>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
</form>
<div class="card">
    <p class="nav-links">
        <a href="{% url 'event_list' %}">Cancel</a>
    </p>
</div>
{% endblock %}
