<!DOCTYPE html>
<html>
<head>
    <title>{% if object %}Edit Event{% else %}Create Event{% endif %}</title>
</head>
<body>
    <h1>{% if object %}Edit Event{% else %}Create Event{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
    <p><a href="{% url 'event_list' %}">Cancel</a></p>
</body>
</html>
