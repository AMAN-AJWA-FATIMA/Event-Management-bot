{% extends 'events/base.html' %}
{% block title %}Password Reset{% endblock %}
{% block content %}
<div class="card" style="max-width:400px; margin:40px auto;">
    <h1>Reset Password</h1>
    <p style="color:var(--text-secondary); margin-bottom:16px;">Enter your email and we'll send you a link to reset your password.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Send reset link</button>
    </form>
    <p class="nav-links" style="margin-top:16px; padding:0;">
        <a href="{% url 'login' %}">Back to login</a>
    </p>
</div>
{% endblock %}
