<!DOCTYPE html>
<html>
<head>
    <title>All Events</title>
</head>
<body>
    <h1>All Events</h1>
    <p>
        <a href="{% url 'events_home' %}">Home</a> |
        <a href="{% url 'event_create' %}">Add Event</a>
    </p>
    <ul>
        {% for event in events %}
        <li>
            <a href="{% url 'event_detail' event.pk %}">{{ event.name }}</a>
            – {{ event.start_date|date:"M d, Y" }}
        </li>
        {% empty %}
        <li>No events yet.</li>
        {% endfor %}
    </ul>
</body>
</html>
