{% extends 'events/base.html' %}
{% block title %}Set new password{% endblock %}
{% block content %}
<div class="card" style="max-width:400px; margin:40px auto;">
    <h1>Set new password</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Reset password</button>
    </form>
</div>
{% endblock %}
