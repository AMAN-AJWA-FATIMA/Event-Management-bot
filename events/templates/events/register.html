{% extends 'events/base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="card user-accent" style="max-width:400px; margin:40px auto;">
    <h1>Register</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>
    <p class="nav-links" style="margin-top:16px; padding:0;">
        <a href="{% url 'login' %}">Already have account? Login</a>
        <a href="{% url 'events_home' %}">Home</a>
    </p>
</div>
{% endblock %}
